<!-- Lesson 3 HTML LIST -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>Unordered List</h1>
    <ul>
        <li>Acrobatic</li>
        <li>Drawing</li>
        <li>Swimming</li>
        <li>Dancing</li>
    </ul>
    
    <h1>Ordered List</h1>

    <ol type="A">
        <li>First item</li>
        <li>Second item</li>
        <li> Third item</li>
        <li> 4th item</li>
        <li> 5th item</li>
    </ol>

    <h1>Description List</h1>
    <dl>
        <dt>JASMS QC</dt>
        <dd>The school we love the best!</dd>
        <dt>UST-Angelicum</dt>
        <dd>Lipatan ng galing sa JASMS</dd>
    </dl>

</body>
</html>
